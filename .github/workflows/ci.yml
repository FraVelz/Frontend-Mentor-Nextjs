name: Continuous Integration - CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "next.config.*"
      - "tsconfig.json"
      - "postcss.config.*"
      - "eslint.config.*"
      - "react-doctor.config.json"
      - "vitest.config.ts"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "next.config.*"
      - "tsconfig.json"
      - "postcss.config.*"
      - "eslint.config.*"
      - "react-doctor.config.json"
      - "vitest.config.ts"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Prettier
        run: pnpm run format:check

      - name: Vitest (gold domain)
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: React Doctor
        continue-on-error: true
        run: pnpm run react:doctor
